version: "3.8"

# ============================================================
# IF4044 Big Data Project - Docker Compose
# Stack: MinIO + Hive Metastore (MySQL) + Trino + Iceberg
# ============================================================

services:

  # ── Object Storage ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9005:9000"   # S3 API
      - "9001:9001"   # MinIO Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse

  # ── MinIO bucket initializer (runs once then exits) ─────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 admin admin123;
        mc mb -p local/lakehouse;
        mc mb -p local/iceberg;
        mc anonymous set public local/lakehouse;
        mc anonymous set public local/iceberg;
        echo 'Buckets created.';
        exit 0;
      "
    networks:
      - lakehouse

  # ── Metastore Database ───────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - lakehouse

  # ── Hive Metastore ───────────────────────────────────────
  hive-metastore:
    build:
      context: ./hive-metastore-config
      dockerfile: Dockerfile
    container_name: hive-metastore
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
      HIVE_METASTORE_USER_NAME: hive
      HIVE_METASTORE_USER_PASSWD: hive
    volumes:
      - ./hive-metastore-config/hive-site.xml:/opt/hive/conf/hive-site.xml
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/localhost/9083"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - lakehouse

  # ── Trino Query Engine ───────────────────────────────────
  trino:
    image: trinodb/trino:480
    container_name: trino
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"   # Trino UI + JDBC
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties
      - ./trino/etc/jvm.config:/etc/trino/jvm.config
      - ./trino/etc/log.properties:/etc/trino/log.properties
      - ./trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties
      - ./trino/catalog/hive.properties:/etc/trino/catalog/hive.properties
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - lakehouse

# ── Named Volumes ────────────────────────────────────────
volumes:
  minio-data:
  mysql-data:

# ── Network ──────────────────────────────────────────────
networks:
  lakehouse:
    driver: bridge
